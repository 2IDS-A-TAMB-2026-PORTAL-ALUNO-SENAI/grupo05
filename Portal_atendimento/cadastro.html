<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Portal do Aluno SENAI - Início</title>

    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="d-flex flex-column min-vh-100">
    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>

    <header class="border-bottom shadow-sm bg-white">
        <nav class="container d-flex justify-content-between align-items-center py-3">

            <div class="d-flex align-items-center gap-3">
                <img src="assets/images/logosenai.png" alt="Logótipo do SENAI" class="img-fluid logo-portal">
                <a href="index.html" class="text-decoration-none">
                    <h1 class="h4 mb-0 text-primary fw-bold">Portal do Aluno SENAI</h1>
                </a>
            </div>

            <div class="d-flex align-items-center gap-3">
                <ul class="menu mb-0">
                    <li>
                        <a href="index.html" class="fw-bold text-primary" aria-current="page">Início</a>
                    </li>
                    <li><a href="cadastro.html" class="text-secondary">Cadastro</a></li>
                </ul>

                <button class="toggle-menu btn btn-outline-primary btn-sm" id="toggle-menu"
                    aria-label="Abrir painel de acessibilidade">
                    Acessibilidade ≡
                </button>

                <div class="acessibilidade p-3 border shadow-sm rounded bg-white" id="painel-acessibilidade">
                    <button id="contraste" class="btn btn-sm btn-dark w-100 mb-2">
                        Alto Contraste
                    </button>
                    <div class="d-flex gap-2">
                        <button id="aumentarFonte" class="btn btn-sm btn-secondary w-50">
                            A+
                        </button>
                        <button id="diminuirFonte" class="btn btn-sm btn-secondary w-50">
                            A-
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="container-form">
        <h2>Cadastro de Aluno</h2>

        <form id="formCadastro" novalidate method="post"  action="index.html">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required />

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required />

            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" name="telefone" required />

            <label for="curso">Curso Desejado</label>
            <select id="curso" name="curso" required>
                <option value="">Selecione</option>
                <option>Desenvolvimento de Sistemas</option>
                <option>Mecatrônica</option>
                <option>Eletrotécnica</option>
                <option>Logística</option>
            </select>

            <fieldset>
                <legend>Turno</legend>
                <div class="turno">
                    <label>
                        <input type="radio" name="turno" value="Manhã" required /> Manhã
                    </label>
                    <label>
                        <input type="radio" name="turno" value="Tarde" /> Tarde
                    </label>
                    <label>
                        <input type="radio" name="turno" value="Noite" /> Noite
                    </label>
                </div>
            </fieldset>

            <div style="margin-top: 20px; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="termos" name="termos" style="width: auto;" required />
                <label for="termos" style="margin: 0; font-weight: normal;">Aceito os termos de uso</label>
            </div>

            <button type="submit">Cadastrar</button>
        </form>
    </div>

    <footer>
        <div class="container">
            <div class="row text-center text-md-start">
                <div class="col-12 col-md-4 mb-3">
                    <h2><i class="fas fa-phone"></i> Contato</h2>
                    <ul class="list-unstyled">
                        <li>
                            <a class="text-white" href="mailto:senai@senai.com">
                                senai@senai.com
                            </a>
                        </li>
                        <li>
                            <a class="text-white" href="tel:+5519991234567">
                                +55 (19) 99123-4567
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="col-12 col-md-4 mb-3">
                    <h2><i class="fa-solid fa-bars"></i> Navegação</h2>
                    <ul class="list-unstyled">
                        <li><a class="text-white" href="cadastro.html">Cadastro</a></li>
                        <li><a class="text-white" href="index.html">Início</a></li>
                    </ul>
                </div>
                <div class="col-12 col-md-4 text-center">
                    <img src="assets/images/senailogo.png" alt="Logo do SENAI" class="img-fluid"
                        style="max-width: 180px"></img>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>new window.VLibras.Widget('https://vlibras.gov.br/app');</script>
    <script src="https://unpkg.com/imask"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="assets/js/res.js"></script>

    <script>
        const telefoneInput = document.getElementById("telefone");
        IMask(telefoneInput, {
            mask: [
                { mask: "(00) 0000-0000" },
                { mask: "(00) 00000-0000" }
            ]
        });

        const form = document.getElementById("formCadastro");

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            let nome = document.getElementById("nome").value.trim();
            let email = document.getElementById("email").value.trim();
            let telefone = document.getElementById("telefone").value.trim();
            let curso = document.getElementById("curso").value;
            let turno = document.querySelector('input[name="turno"]:checked');
            let termos = document.getElementById("termos").checked;

            if (nome === "" || email === "" || telefone === "" || curso === "" || !turno || !termos) {
                Swal.fire({
                    icon: 'error',
                    title: 'Atenção!',
                    text: 'Por favor, preencha todos os campos obrigatórios e aceite os termos para continuar.',
                    confirmButtonColor: '#003366'
                });
            } else {
                Swal.fire({
                    icon: 'success',
                    title: 'Cadastro Realizado!',
                    text: `Parabéns, ${nome}! Seu cadastro no curso de ${curso} foi recebido com sucesso.`,
                    confirmButtonColor: '#F15D36'
                }).then(() => {
                    window.location.href = "index.html";
                });
            }
        });
    </script>
</body>

</html>
